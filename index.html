<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#06080c" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Iroto Web</title>
  <link rel="manifest" href="manifest.webmanifest?v=2.15" />
  <link rel="stylesheet" href="styles.css?v=2.15" />
</head>
<body>
  <div id="app">
    <header class="topbar">
      <select id="langSelect" class="lang-select" aria-label="Language">
        <option value="ja" selected>日本語</option>
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
      <div class="title">
        <span id="appTitle">Iroto Web</span>
        <span id="fileName" class="file-name">写真未選択</span>
      </div>
      <button id="helpBtn" class="icon-btn" type="button" aria-label="互換性">?</button>
    </header>

    <main class="stage-wrap">
      <canvas id="stage" aria-label="Iroto performance canvas"></canvas>

      <section id="emptyState" class="empty-state">
        <div class="logo-dot" aria-hidden="true">
          <svg class="logo-svg" viewBox="0 0 96 96" role="img" focusable="false">
            <defs>
              <linearGradient id="irotoLogoBg" x1="14" y1="10" x2="84" y2="88" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#78E1FF"/>
                <stop offset="0.36" stop-color="#7A8CFF"/>
                <stop offset="0.66" stop-color="#FF8BD4"/>
                <stop offset="1" stop-color="#FFD166"/>
              </linearGradient>
              <radialGradient id="irotoLogoGlow" cx="30" cy="24" r="44" gradientUnits="userSpaceOnUse">
                <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.86"/>
                <stop offset="0.38" stop-color="#FFFFFF" stop-opacity="0.18"/>
                <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect x="4" y="4" width="88" height="88" rx="30" fill="url(#irotoLogoBg)"/>
            <rect x="4" y="4" width="88" height="88" rx="30" fill="url(#irotoLogoGlow)"/>
            <path d="M22 58 C34 38, 48 36, 62 49 C71 57, 79 56, 86 45 L86 82 L22 82 Z" fill="rgba(6,16,30,0.18)"/>
            <circle cx="48" cy="48" r="25" fill="rgba(255,255,255,0.16)" stroke="rgba(255,255,255,0.58)" stroke-width="3"/>
            <path d="M48 23 L48 73 M23 48 L73 48" stroke="rgba(255,255,255,0.72)" stroke-width="4" stroke-linecap="round"/>
            <circle cx="48" cy="48" r="16" fill="rgba(6,16,30,0.10)"/>
            <path d="M57 31 v27.5 c0 8.2-6.5 12.8-13.5 11.2 c-5.6-1.3-8.1-5.7-6.6-9.6 c1.5-3.9 6.2-5.6 11-3.9 c1.6 0.6 2.9 1.3 4.1 2.3 V35 Z" fill="#06101E" opacity="0.78"/>
            <circle cx="75" cy="22" r="3.2" fill="rgba(255,255,255,0.92)"/>
            <circle cx="24" cy="76" r="2.4" fill="rgba(255,255,255,0.78)"/>
          </svg>
        </div>
        <h1>Iroto Web</h1>
        <p id="homeLead">写真を選択し、<br>傾けて演奏しましょう。</p>
        <div class="empty-actions">
          <button id="choosePhotoBtn" class="primary-btn" type="button">写真を選択</button>
          
        </div>
        <p id="homeHint" class="hint">Android は Chrome、iPhone は Safari 推奨。<br>すべての権限を許可してください。</p>
      </section>
    </main>

    <footer id="bottomBar" class="bottombar hidden">
      <button id="photoBtn" class="round-btn" type="button" title="写真を選択">▧</button>

      <div class="bpm-group">
        <button id="bpmMinus" class="small-btn" type="button">−</button>
        <span id="bpmLabel" class="pill">BPM 100</span>
        <button id="bpmPlus" class="small-btn" type="button">+</button>
      </div>

      <button id="recordBtn" class="round-btn record" type="button" title="録画">○</button>
    </footer>

    <div id="sensorStatus" class="sensor-status hidden" aria-hidden="true">センサー</div>
    <button id="sensorBtn" class="recenter-btn hidden" type="button" title="センサーを有効化 / 再センター">⌖</button>
    <button id="playBtn" class="play-btn hidden" type="button" aria-label="再生">▶</button>
    <div id="recordTimer" class="record-timer hidden" aria-live="polite">● 00:00</div>

    <input id="fileInput" type="file" accept="image/*" hidden />

    <dialog id="saveDialog" class="dialog">
      <form method="dialog" class="dialog-card">
        <h2>演奏動画を保存</h2>
        <p id="recordInfo">録画が完了しました。</p>
        <label class="input-label">
          ファイル名
          <div id="saveNameInput" class="filename-edit" contenteditable="true" role="textbox" aria-label="filename" spellcheck="false" autocorrect="off" autocapitalize="off" translate="no">Iroto</div>
        </label>
        <div class="dialog-actions">
          <button id="discardBtn" class="secondary-btn" value="discard" type="button">削除</button>
          <button id="saveBtn" class="primary-btn" value="save" type="button">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="compatDialog" class="dialog">
      <form method="dialog" class="dialog-card compat-card">
        <div class="compat-header">
          <h2>互換性チェック</h2>
          <p id="compatVersion" class="version-label">v2.15</p>
        </div>
        <p class="hint">
          センサー機能は通常 HTTPS が必要です。録画形式はブラウザに応じて MP4 または WebM が自動選択されます。
        </p>
        <div id="compatList" class="compat-list"></div>
        <div class="dialog-actions">
          <button class="primary-btn" value="ok">閉じる</button>
        </div>
      </form>
    </dialog>
  </div>

  <script src="app.js?v=2.15"></script>
</body>
</html>
